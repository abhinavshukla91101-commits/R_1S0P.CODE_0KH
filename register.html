<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream? // Node Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div><div class="scanlines"></div>
    <div class="container" style="max-width: 500px;">
        <section class="modern-card reveal" style="margin-top: 15%;">
            <h2>[ INITIALIZE PROFILE NODE ]</h2>
            <form action="YOUR_RENDER_URL/register" method="POST" class="submission-form">
                <div class="form-group"><label>USERNAME</label><input type="text" name="username" required></div>
                <div class="form-group"><label>EMAIL FOR VERIFICATION PIN</label><input type="email" name="email" required></div>
                <div class="form-group"><label>MOBILE NUMBER</label><input type="tel" name="phone" placeholder="+1..." required></div>
                <div class="form-group"><label>SECURITY PASSWORD</label><input type="password" name="password" required></div>
                <button type="submit" class="submit-btn">> ENGAGE IDENTITY PING</button>
            </form>
        </section>
    </div>
    <script src="reveal.js"></script>
</body>
</html>
